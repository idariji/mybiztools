# Google Cloud Build configuration for MyBizTools
# This file orchestrates the build and deployment of both frontend and backend

steps:
  # ============ BACKEND BUILD & DEPLOY ============

  # Step 1: Build backend Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/mybiztools-backend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/mybiztools-backend:latest'
      - '-f'
      - 'mybiztools-backend/Dockerfile'
      - './mybiztools-backend'
    id: 'build-backend'

  # Step 2: Push backend image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/mybiztools-backend:$COMMIT_SHA'
    id: 'push-backend'
    waitFor: ['build-backend']

  # Step 3: Deploy backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'mybiztools-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/mybiztools-backend:$COMMIT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'NODE_ENV=production'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--port'
      - '8080'
    id: 'deploy-backend'
    waitFor: ['push-backend']

  # ============ FRONTEND BUILD & DEPLOY ============

  # Step 4: Get backend URL for frontend build
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        BACKEND_URL=$(gcloud run services describe mybiztools-backend --region=${_REGION} --format='value(status.url)')
        echo "VITE_API_URL=$BACKEND_URL" > /workspace/frontend.env
    id: 'get-backend-url'
    waitFor: ['deploy-backend']

  # Step 5: Build frontend Docker image with backend URL
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        source /workspace/frontend.env
        docker build \
          --build-arg VITE_API_URL=$VITE_API_URL \
          -t gcr.io/$PROJECT_ID/mybiztools-frontend:$COMMIT_SHA \
          -t gcr.io/$PROJECT_ID/mybiztools-frontend:latest \
          -f Dockerfile \
          .
    id: 'build-frontend'
    waitFor: ['get-backend-url']

  # Step 6: Push frontend image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/mybiztools-frontend:$COMMIT_SHA'
    id: 'push-frontend'
    waitFor: ['build-frontend']

  # Step 7: Deploy frontend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'mybiztools-frontend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/mybiztools-frontend:$COMMIT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '256Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--port'
      - '80'
    id: 'deploy-frontend'
    waitFor: ['push-frontend']

# Substitution variables (can be overridden at build time)
substitutions:
  _REGION: 'us-central1'

# Build options
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

# Images to be pushed to Container Registry
images:
  - 'gcr.io/$PROJECT_ID/mybiztools-backend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/mybiztools-backend:latest'
  - 'gcr.io/$PROJECT_ID/mybiztools-frontend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/mybiztools-frontend:latest'

# Build timeout (30 minutes)
timeout: '1800s'

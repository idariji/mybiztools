services:
  - type: web
    name: mybiztools-api
    runtime: node
    region: frankfurt
    plan: free
    rootDir: mybiztools-backend
    buildCommand: npm ci && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: node dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: TERMII_API_KEY
        sync: false
      - key: TERMII_SENDER_ID
        value: MyBizTools
      - key: FRONTEND_URL
        value: https://mybiztools.onrender.com
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SETUP_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
